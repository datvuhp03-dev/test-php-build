name: DevStack Build All PHP Versions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-php:
    name: Compile PHP ${{ matrix.php_version }}
    runs-on: ubuntu-latest
    container:
      image: debian:10
    strategy:
      fail-fast: false
      matrix:
        php_version: 
          - '5.6.40'
          - '7.0.33'
          - '7.1.33'
          - '7.2.34'
          - '7.3.33'
          - '7.4.33'
          - '8.0.30'
          - '8.1.31'
          - '8.2.27'
          - '8.3.17'
          - '8.4.4'
          - '8.5.4'
          
    steps:
      - name: Install Build Systems & Dependencies
        run: |
          sed -i -e 's/deb.debian.org/archive.debian.org/g' \
                 -e 's|security.debian.org|archive.debian.org/|g' \
                 -e '/stretch-updates/d' /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/10no--check-valid-until
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential autoconf libtool bison re2c \
            pkg-config libxml2-dev libsqlite3-dev libcurl4-openssl-dev \
            libssl-dev libonig-dev libzip-dev libgd-dev libjpeg-dev \
            libpng-dev libfreetype6-dev libwebp-dev libmcrypt-dev \
            libreadline-dev libtidy-dev libxslt1-dev wget curl patchelf tar

      - name: Download PHP Source from php.net
        run: |
          wget https://www.php.net/distributions/php-${{ matrix.php_version }}.tar.gz || wget https://museum.php.net/php5/php-${{ matrix.php_version }}.tar.gz
          tar -zxvf php-${{ matrix.php_version }}.tar.gz
          
      - name: Configure and Compile PHP
        
        run: |
          cd php-${{ matrix.php_version }}
          ./configure \
            --prefix=/opt/devstack/php \
            --enable-fpm \
            --with-fpm-user=www-data \
            --with-fpm-group=www-data \
            --enable-bcmath \
            --enable-calendar \
            --enable-exif \
            --enable-ftp \
            --enable-mbstring \
            --enable-pcntl \
            --enable-sockets \
            --enable-soap \
            --with-curl \
            --with-openssl \
            --with-zip \
            --with-zlib \
            --with-mysqli=mysqlnd \
            --with-pdo-mysql=mysqlnd \
            --with-pdo-sqlite \
            --enable-gd \
            --with-freetype \
            --with-jpeg \
            --with-webp || ./configure --prefix=/opt/devstack/php --enable-fpm --with-mysqli --with-pdo-mysql --with-openssl --with-curl --with-zlib --enable-mbstring
          make -j$(nproc)
          make install INSTALL_ROOT=$(pwd)/install_dir
          
      - name: Package PHP
        shell: bash
        
        run: |
          cd php-${{ matrix.php_version }}/install_dir/opt/devstack/php/

          mkdir -p lib/shared
          ldd bin/php sbin/php-fpm | grep "=> /" | awk '{print $3}' | sort -u | while read -r lib; do
            if [[ "$lib" != *"/libc.so."* ]] && [[ "$lib" != *"/libdl.so."* ]] && [[ "$lib" != *"/libpthread.so."* ]] && [[ "$lib" != *"/libm.so."* ]] && [[ "$lib" != *"/ld-linux"* ]] && [[ "$lib" != *"/librt.so."* ]] && [[ "$lib" != *"/libgcc_s.so."* ]] && [[ "$lib" != *"/libresolv.so"* ]] && [[ "$lib" != *"/libnsl.so"* ]] && [[ "$lib" != *"/libutil.so"* ]]; then
              cp "$lib" lib/shared/ || true
            fi
          done

          patchelf --force-rpath --set-rpath '$ORIGIN/../lib/shared' bin/php || true
          patchelf --force-rpath --set-rpath '$ORIGIN/../lib/shared' sbin/php-fpm || true

          for so in lib/shared/*.so*; do
            if [ -f "$so" ]; then
              patchelf --force-rpath --set-rpath '$ORIGIN' "$so" || true
            fi
          done

          wget -qO lib/php.ini "https://raw.githubusercontent.com/php/php-src/PHP-${{ matrix.php_version }}/php.ini-development" || true

          tar -czvf /tmp/php-${{ matrix.php_version }}-native-linux-x64.tar.gz .

      - name: Release Build
        
        uses: softprops/action-gh-release@v2
        with:
          tag_name: php-v${{ matrix.php_version }}
          name: DevStack Native PHP ${{ matrix.php_version }} (Linux x64)
          draft: false
          prerelease: false
          files: |
            /tmp/php-${{ matrix.php_version }}-native-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
