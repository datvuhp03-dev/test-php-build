name: Build Linux Portable PHP

on:
  workflow_dispatch:
    inputs:
      php_version:
        description: 'PHP Version to build (e.g., 8.2, 8.3, 7.4)'
        required: true
        default: '8.2'

jobs:
  build-static-php:
    name: Build PHP ${{ github.event.inputs.php_version }} for Linux x64
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download static-php-cli (spc)
        run: |
          echo "Downloading SPC compiler..."
          wget -O spc.tgz "https://dl.static-php.dev/static-php-cli/spc-linux-x86_64.tar.gz"
          tar -xvf spc.tgz
          chmod +x spc

      - name: Download PHP Sources and Extensions
        run: |
          echo "Fetching sources for PHP ${{ github.event.inputs.php_version }}..."
          # Đổi các extension cần thiết cho DevStack ở đây
          ./spc download --all --for-extensions="bcmath,bz2,calendar,ctype,curl,dom,exif,fileinfo,filter,gd,iconv,mbstring,mysqli,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,session,simplexml,sockets,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib" --with-php=${{ github.event.inputs.php_version }}

      - name: Compile Static PHP & FPM
        run: |
          echo "Compiling Static PHP Binaries..."
          ./spc build --build-fpm --build-cli "bcmath,bz2,calendar,ctype,curl,dom,exif,fileinfo,filter,gd,iconv,mbstring,mysqli,opcache,openssl,pcntl,pdo,pdo_mysql,pdo_sqlite,phar,posix,session,simplexml,sockets,sqlite3,tokenizer,xml,xmlreader,xmlwriter,zip,zlib" --with-php=${{ github.event.inputs.php_version }}

      - name: Package Binaries for DevStack
        run: |
          echo "Packaging results..."
          mkdir -p devstack-php-linux-x64/sbin
          mkdir -p devstack-php-linux-x64/bin
          
          # Copy FPM and CLI vào thư mục giống cấu trúc tải về của bạn
          cp buildroot/bin/php devstack-php-linux-x64/bin/php
          cp buildroot/bin/php-fpm devstack-php-linux-x64/sbin/php-fpm
          
          # Nén lại thành file tar.gz
          tar -czvf php-${{ github.event.inputs.php_version }}-linux-x64.tar.gz devstack-php-linux-x64/

      - name: Upload Build Artifact (Tải File Nhị Phân)
        uses: actions/upload-artifact@v4
        with:
          name: php-${{ github.event.inputs.php_version }}-linux-x64
          path: php-${{ github.event.inputs.php_version }}-linux-x64.tar.gz
          retention-days: 7