name: DevStack Nginx Builder

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        description: 'Nginx Version (e.g., 1.25.4)'
        required: true
        default: '1.25.4'

permissions:
  contents: write

jobs:
  build-nginx:
    name: Compile Nginx ${{ github.event.inputs.nginx_version }}
    runs-on: ubuntu-latest
    container:
      image: debian:10
      
    steps:
      - name: Install Build Systems & Dependencies
        run: |
          sed -i -e 's/deb.debian.org/archive.debian.org/g' \
                 -e 's|security.debian.org|archive.debian.org/|g' \
                 -e '/stretch-updates/d' /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/10no--check-valid-until
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential wget curl libpcre3 libpcre3-dev zlib1g zlib1g-dev libssl-dev tar

      - name: Download Nginx Source
        run: |
          wget http://nginx.org/download/nginx-${{ github.event.inputs.nginx_version }}.tar.gz
          tar -zxvf nginx-${{ github.event.inputs.nginx_version }}.tar.gz
          
      - name: Configure and Compile Nginx
        run: |
          cd nginx-${{ github.event.inputs.nginx_version }}
          ./configure \
            --prefix=/etc/nginx \
            --sbin-path=/usr/sbin/nginx \
            --conf-path=/etc/nginx/nginx.conf \
            --error-log-path=/var/log/nginx/error.log \
            --http-log-path=/var/log/nginx/access.log \
            --pid-path=/var/run/nginx.pid \
            --lock-path=/var/run/nginx.lock \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_realip_module
          make -j$(nproc)
          make install DESTDIR=$(pwd)/output
          
      - name: Package Nginx
        run: |
          cd nginx-${{ github.event.inputs.nginx_version }}/output
          tar -czvf /nginx-${{ github.event.inputs.nginx_version }}-native-linux-x64.tar.gz .

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nginx-${{ github.event.inputs.nginx_version }}-linux
          path: /nginx-${{ github.event.inputs.nginx_version }}-native-linux-x64.tar.gz

      - name: Release Build
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nginx-v${{ github.event.inputs.nginx_version }}
          files: /nginx-${{ github.event.inputs.nginx_version }}-native-linux-x64.tar.gz