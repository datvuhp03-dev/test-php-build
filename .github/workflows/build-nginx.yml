name: DevStack Build All Nginx Versions

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-nginx:
    name: Compile Nginx ${{ matrix.nginx_version }}
    runs-on: ubuntu-latest
    container:
      image: debian:10
    strategy:
      fail-fast: false
      matrix:
        nginx_version:
          - '1.20.2'
          - '1.22.1'
          - '1.24.0'
          - '1.26.3'
          - '1.27.4'
          
    steps:
      - name: Install Build Systems & Dependencies
        run: |
          sed -i -e 's/deb.debian.org/archive.debian.org/g' \
                 -e 's|security.debian.org|archive.debian.org/|g' \
                 -e '/stretch-updates/d' /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/10no--check-valid-until
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential wget curl libpcre3 libpcre3-dev zlib1g zlib1g-dev libssl-dev tar patchelf

      - name: Download Nginx Source
        run: |
          wget http://nginx.org/download/nginx-${{ matrix.nginx_version }}.tar.gz
          tar -zxvf nginx-${{ matrix.nginx_version }}.tar.gz
          
      - name: Configure and Compile Nginx
        
        run: |
          cd nginx-${{ matrix.nginx_version }}
          ./configure \
            --prefix=/etc/nginx \
            --sbin-path=/usr/sbin/nginx \
            --conf-path=/etc/nginx/nginx.conf \
            --error-log-path=/var/log/nginx/error.log \
            --http-log-path=/var/log/nginx/access.log \
            --pid-path=/var/run/nginx.pid \
            --lock-path=/var/run/nginx.lock \
            --with-http_ssl_module \
            --with-http_v2_module \
            --with-http_realip_module
          make -j$(nproc)
          make install DESTDIR=$(pwd)/output
          
      - name: Package Nginx
        shell: bash
        
        run: |
          cd nginx-${{ matrix.nginx_version }}/output/

          mkdir -p usr/sbin/lib/shared
          ldd usr/sbin/nginx | grep "=> /" | awk '{print $3}' | sort -u | while read -r lib; do
            if [[ "$lib" != *"/libc.so."* ]] && [[ "$lib" != *"/libdl.so."* ]] && [[ "$lib" != *"/libpthread.so."* ]] && [[ "$lib" != *"/libm.so."* ]] && [[ "$lib" != *"/ld-linux"* ]] && [[ "$lib" != *"/librt.so."* ]] && [[ "$lib" != *"/libgcc_s.so."* ]] && [[ "$lib" != *"/libresolv.so"* ]] && [[ "$lib" != *"/libnsl.so"* ]] && [[ "$lib" != *"/libutil.so"* ]]; then
              cp "$lib" usr/sbin/lib/shared/ || true
            fi
          done

          patchelf --force-rpath --set-rpath '$ORIGIN/lib/shared' usr/sbin/nginx || true

          for so in usr/sbin/lib/shared/*.so*; do
            if [ -f "$so" ]; then
              patchelf --force-rpath --set-rpath '$ORIGIN' "$so" || true
            fi
          done

          tar -czvf /tmp/nginx-${{ matrix.nginx_version }}-native-linux-x64.tar.gz .

      - name: Release Build
        
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nginx-v${{ matrix.nginx_version }}
          name: DevStack Native Nginx ${{ matrix.nginx_version }} (Linux x64)
          draft: false
          prerelease: false
          files: |
            /tmp/nginx-${{ matrix.nginx_version }}-native-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
