name: DevStack Build PHP 5.6

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-php56:
    name: Compile PHP 5.6.40
    runs-on: ubuntu-latest
    container:
      image: debian:10
      
    steps:
      - name: Install Build Systems & Dependencies
        run: |
          sed -i -e 's/deb.debian.org/archive.debian.org/g' \
                 -e 's|security.debian.org|archive.debian.org/|g' \
                 -e '/stretch-updates/d' /etc/apt/sources.list
          echo "Acquire::Check-Valid-Until \"false\";" > /etc/apt/apt.conf.d/10no--check-valid-until
          apt-get update
          DEBIAN_FRONTEND=noninteractive apt-get install -y \
            build-essential autoconf libtool bison re2c \
            pkg-config libxml2-dev libsqlite3-dev libcurl4-openssl-dev \
            libonig-dev libzip-dev libgd-dev libjpeg-dev \
            libpng-dev libfreetype6-dev libwebp-dev libmcrypt-dev \
            libreadline-dev libtidy-dev libxslt1-dev wget curl patchelf tar

      - name: Compile OpenSSL 1.0.2 (For PHP 5.6 Compatibility)
        run: |
          wget https://www.openssl.org/source/old/1.0.2/openssl-1.0.2u.tar.gz
          tar -xzf openssl-1.0.2u.tar.gz
          cd openssl-1.0.2u
          ./config shared --prefix=/opt/openssl-1.0.2 --openssldir=/opt/openssl-1.0.2
          make -j$(nproc)
          make install

      - name: Download PHP 5.6 Source
        run: |
          wget https://museum.php.net/php5/php-5.6.40.tar.gz
          tar -zxvf php-5.6.40.tar.gz
          
      - name: Configure and Compile PHP 5.6
        run: |
          mkdir -p /opt/openssl-1.0.2/lib/x86_64-linux-gnu
          ln -s /opt/openssl-1.0.2/lib/libssl.so /opt/openssl-1.0.2/lib/x86_64-linux-gnu/libssl.so
          ln -s /opt/openssl-1.0.2/lib/libcrypto.so /opt/openssl-1.0.2/lib/x86_64-linux-gnu/libcrypto.so
          ln -s /usr/include/x86_64-linux-gnu/curl /usr/include/curl
          echo '#!/bin/sh' > /usr/bin/freetype-config
          echo 'pkg-config freetype2 "$@"' >> /usr/bin/freetype-config
          chmod +x /usr/bin/freetype-config
          cd php-5.6.40
          export PKG_CONFIG_PATH=/opt/openssl-1.0.2/lib/pkgconfig:$PKG_CONFIG_PATH
          ./configure \
            --prefix=/opt/devstack/php \
            --enable-fpm \
            --with-fpm-user=www-data \
            --with-fpm-group=www-data \
            --enable-bcmath \
            --enable-calendar \
            --enable-exif \
            --enable-ftp \
            --enable-mbstring \
            --enable-pcntl \
            --enable-sockets \
            --enable-soap \
            --with-curl=/usr \
            --with-libdir=lib/x86_64-linux-gnu \
            --with-openssl-dir=/opt/openssl-1.0.2 \
            --with-openssl=/opt/openssl-1.0.2 \
            --enable-zip \
            --with-zlib \
            --with-mysql=mysqlnd \
            --with-mysqli=mysqlnd \
            --with-pdo-mysql=mysqlnd \
            --with-pdo-sqlite \
            --with-gd \
            --with-freetype-dir=/usr \
            --with-jpeg-dir=/usr \
            --with-mcrypt
          make -j$(nproc)
          make install INSTALL_ROOT=$(pwd)/install_dir
          
      - name: Package PHP 5.6
        shell: bash
        run: |
          cd php-5.6.40/install_dir/opt/devstack/php/

          mkdir -p lib/shared
          ldd bin/php sbin/php-fpm | grep "=> /" | awk '{print $3}' | sort -u | while read -r lib; do
            if [[ "$lib" != *"/libc.so."* ]] && [[ "$lib" != *"/libdl.so."* ]] && [[ "$lib" != *"/libpthread.so."* ]] && [[ "$lib" != *"/libm.so."* ]] && [[ "$lib" != *"/ld-linux"* ]] && [[ "$lib" != *"/librt.so."* ]] && [[ "$lib" != *"/libgcc_s.so."* ]] && [[ "$lib" != *"/libresolv.so"* ]] && [[ "$lib" != *"/libnsl.so"* ]] && [[ "$lib" != *"/libutil.so"* ]]; then
              cp "$lib" lib/shared/ || true
            fi
          done

          patchelf --force-rpath --set-rpath '$ORIGIN/../lib/shared' bin/php || true
          patchelf --force-rpath --set-rpath '$ORIGIN/../lib/shared' sbin/php-fpm || true

          for so in lib/shared/*.so*; do
            if [ -f "$so" ]; then
              patchelf --force-rpath --set-rpath '$ORIGIN' "$so" || true
            fi
          done

          wget -qO lib/php.ini "https://raw.githubusercontent.com/php/php-src/PHP-5.6.40/php.ini-development" || true

          tar -czvf /tmp/php-5.6.40-native-linux-x64.tar.gz .

      - name: Release Build
        uses: softprops/action-gh-release@v2
        with:
          tag_name: php-v5.6.40
          name: DevStack Native PHP 5.6.40 (Linux x64)
          draft: false
          prerelease: false
          files: |
            /tmp/php-5.6.40-native-linux-x64.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}